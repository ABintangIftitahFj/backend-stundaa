name: Fast Deploy (ZIP + PHP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Deployment ZIP
        run: |
          # Exclude: .git, .github, node_modules, storage keys, vendor, user uploads
          zip -r deploy.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "storage/*.key" \
            -x "storage/app/*" \
            -x "vendor/*"

      - name: Upload ZIP and Unzipper via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: stundaa.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./public_html/
          exclude: |
            **/*
            !deploy.zip
            !unzip_deploy.php

      - name: Trigger Unzip via URL
        run: |
          # Wait for FTP upload to stabilize
          sleep 15
          # --fail: non-zero exit on HTTP 4xx/5xx
          curl -s --fail "https://stundaa.com/unzip_deploy.php?token=${{ secrets.DEPLOY_TOKEN }}" | grep "Success"
