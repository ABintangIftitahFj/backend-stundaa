name: Fast Deploy (ZIP + PHP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Deployment ZIP
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "storage/*.key" \
            -x "storage/app/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*" \
            -x "vendor/*" \
            -x "*.log" \
            -x "tests/*" \
            -x "bootstrap/cache/*"
          echo "ZIP size: $(du -sh deploy.zip | cut -f1)"

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Upload via lftp (with retry + resume)
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ssl:verify-certificate no;
            open -u '$FTP_USER','$FTP_PASS' ftp://stundaa.com;
            put -O /public_html/ deploy.zip;
            put -O /public_html/ unzip_deploy.php;
            bye;
          "

      - name: Trigger Unzip via URL
        run: |
          sleep 15
          curl -s --fail "https://stundaa.com/unzip_deploy.php?token=${{ secrets.DEPLOY_TOKEN }}" | grep "Success"
