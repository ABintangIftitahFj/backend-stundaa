name: Fast Deploy (ZIP + PHP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Deployment ZIP
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "storage/*.key" \
            -x "storage/app/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*" \
            -x "vendor/*" \
            -x "*.log" \
            -x "tests/*" \
            -x "bootstrap/cache/*"

      - name: Show ZIP size
        run: du -sh deploy.zip

      - name: Upload ZIP and Unzipper via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: stundaa.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: ./public_html/
          timeout: 120000
          exclude: |
            **/*
            !deploy.zip
            !unzip_deploy.php

      - name: Trigger Unzip via URL
        run: |
          sleep 15
          curl -s --fail "https://stundaa.com/unzip_deploy.php?token=${{ secrets.DEPLOY_TOKEN }}" | grep "Success"
